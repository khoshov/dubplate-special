{% if show_banner %}
  <ul class="messagelist">
    <li class="{{ banner_level }}">
      <strong>YouTube-сессия:</strong>
      {{ state.get_status_display }}
      {% if state.status_message %}
        <br>{{ state.status_message }}
      {% endif %}
      <br>
      <form action="{{ refresh_url }}" method="post" style="display:inline-block; margin:8px 12px 0 0;">
        {% csrf_token %}
        <button type="submit" class="button">Обновить YouTube-сессию</button>
      </form>
      <a href="{{ recover_url }}" class="button" style="display:inline-block; margin:8px 12px 0 0;">Авторизовать YouTube-сессию</a>
      {% if ui_url %}
        <a href="{{ ui_url }}" target="_blank" rel="noopener" class="button" style="margin-top:8px;">Открыть YouTube session UI</a>
      {% endif %}
    </li>
  </ul>
{% endif %}
