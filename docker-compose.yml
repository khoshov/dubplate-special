services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uv run manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./locale:/app/locale
      - ./media:/app/media
      - ./manage.py:/app/manage.py
      - ./pytest.ini:/app/pytest.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]

  redis:
    image: redis:7-alpine
    container_name: dubplate_redis
    ports:
      - "6379:6379"


  celery:
    build:
      context: .
      dockerfile: Dockerfile-celery
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./media:/app/media
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - django

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile-celery  # Используем тот же Dockerfile что и для celery
    container_name: dubplate_celery_beat
    command: uv run celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./media:/app/media
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - celery