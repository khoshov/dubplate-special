services:
  django:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RUN_ENV: docker
    command: uv run manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./locale:/app/locale
      - ./media:/app/media
      - ./runtime:/app/runtime
      - ./templates:/app/templates
      - ./manage.py:/app/manage.py
      - ./pytest.ini:/app/pytest.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    env_file:
      - .env
    environment:
      RUN_ENV: docker
    command: uv run celery -A config worker --loglevel=info --queues=celery,youtube_session_login
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./locale:/app/locale
      - ./media:/app/media
      - ./runtime:/app/runtime
      - ./templates:/app/templates
      - ./manage.py:/app/manage.py
      - ./pytest.ini:/app/pytest.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_vk_publication:
    build: .
    env_file:
      - .env
    environment:
      RUN_ENV: docker
    command: uv run celery -A config worker --loglevel=info --queues=vk_publication --concurrency=1 --hostname=vk_publication@%h
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./locale:/app/locale
      - ./media:/app/media
      - ./runtime:/app/runtime
      - ./templates:/app/templates
      - ./manage.py:/app/manage.py
      - ./pytest.ini:/app/pytest.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  youtube_session_login:
    build: .
    env_file:
      - .env
    environment:
      RUN_ENV: docker
      DISPLAY: :99
      YOUTUBE_SESSION_NOVNC_PORT: 6080
      YOUTUBE_SESSION_VNC_PORT: 5900
    command: sh /app/scripts/start_youtube_session_ui.sh
    ports:
      - "6080:6080"
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./locale:/app/locale
      - ./media:/app/media
      - ./runtime:/app/runtime
      - ./templates:/app/templates
      - ./manage.py:/app/manage.py
      - ./pytest.ini:/app/pytest.ini
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20


