services:
  django:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./locale:/app/locale
      - ./media:/app/media
      - ./manage.py:/app/manage.py
      - ./pytest.ini:/app/pytest.ini
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
