services:
  django:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RUN_ENV: docker
    command: uv run manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./locale:/app/locale
      - ./media:/app/media
      - ./manage.py:/app/manage.py
      - ./pytest.ini:/app/pytest.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    env_file:
      - .env
    environment:
      RUN_ENV: docker
    command: uv run celery -A config worker --loglevel=info
    volumes:
      - ./apps:/app/apps
      - ./config:/app/config
      - ./locale:/app/locale
      - ./media:/app/media
      - ./manage.py:/app/manage.py
      - ./pytest.ini:/app/pytest.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
