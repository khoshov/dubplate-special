name: Ruff Check

on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chartboost/ruff-action@v1
        with:
          args: "check ."
          # Дополнительные опции:
          # fix: "true"  # Включить автофикс
          # format: "true"  # Проверить форматирование
